# GitHub Actions Workflow for Signed Release APK
# 
# This workflow builds a SIGNED release APK suitable for Google Play Store distribution.
# 
# SETUP REQUIRED:
# 1. Generate a keystore file for signing:
#    keytool -genkey -v -keystore release-key.keystore -keyalg RSA -keysize 2048 -validity 10000
# 
# 2. Encode the keystore as base64:
#    base64 -i release-key.keystore
# 
# 3. Add GitHub Secrets:
#    - KEYSTORE_BASE64: (base64 encoded keystore content)
#    - KEYSTORE_PASSWORD: (your keystore password)
#    - KEY_ALIAS: (key alias from keystore)
#    - KEY_PASSWORD: (key password from keystore)
# 
# 4. Update the android/key.properties file values if needed
#
# How to add secrets to GitHub:
# Go to: Settings > Secrets and variables > Actions > New repository secret
#
# Uncomment below to use this workflow:

