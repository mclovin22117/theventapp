name: theventapp
description: "A platform where users post their feelings and thoughts anonymously."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # Navigation
  go_router: ^14.6.2

  # Image Picker
  image_picker: ^1.1.2

  # Storing session locally
  shared_preferences: ^2.3.3

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/